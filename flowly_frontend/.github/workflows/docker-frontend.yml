name: Build Docker Frontend

on:
  push:
    branches: ["main"]

env:
  REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
  REACT_APP_API_PUBLIC_URL: ${{ secrets.REACT_APP_API_PUBLIC_URL }}
  REACT_APP_SOCKET_URL: ${{ secrets.REACT_APP_SOCKET_URL }}
  REACT_APP_ASSISTANT_URL: ${{ secrets.REACT_APP_ASSISTANT_URL }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validar variaveis do frontend
        run: |
          test -n "${REACT_APP_API_URL}" || (echo "REACT_APP_API_URL nao foi configurado nos GitHub Secrets" && exit 1)
          test -n "${REACT_APP_API_PUBLIC_URL}" || (echo "REACT_APP_API_PUBLIC_URL nao foi configurado nos GitHub Secrets" && exit 1)
          test -n "${REACT_APP_SOCKET_URL}" || (echo "REACT_APP_SOCKET_URL nao foi configurado nos GitHub Secrets" && exit 1)
          test -n "${REACT_APP_ASSISTANT_URL}" || (echo "REACT_APP_ASSISTANT_URL nao foi configurado nos GitHub Secrets" && exit 1)

      - name: Build da imagem do Frontend
        run: |
          docker build \
            --build-arg REACT_APP_API_URL="${REACT_APP_API_URL}" \
            --build-arg REACT_APP_API_PUBLIC_URL="${REACT_APP_API_PUBLIC_URL}" \
            --build-arg REACT_APP_SOCKET_URL="${REACT_APP_SOCKET_URL}" \
            --build-arg REACT_APP_ASSISTANT_URL="${REACT_APP_ASSISTANT_URL}" \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/flowly-frontend:latest .

      - name: Push da imagem
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/flowly-frontend:latest
